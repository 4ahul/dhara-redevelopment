# Ruff configuration for Dhara AI
target-version = "py311"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "RET", # flake8-return
    "PTH", # flake8-use-pathlib
    "PIE", # flake8-pie
    "RUF", # Ruff-specific rules
    "TCH", # flake8-type-checking
    "ISC", # flake8-implicit-str-concat
    "G",   # flake8-logging-format
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function call in argument defaults (FastAPI Depends)
    "G004",   # f-string in logging (preferred for readability)
    "G201",   # logging-exc-info (error(..., exc_info=True) vs exception())
    "RUF001", # ambiguous unicode in strings (intentional for reports)
    "RUF002", # ambiguous unicode in docstrings
    "RUF003", # ambiguous unicode in comments
    "RUF012", # mutable-class-default (often intentional for registries)
    "PTH",    # use-pathlib (many existing os.path usages)
    "TC003",  # typing-only-standard-library-import
    "SIM115", # open-file-with-context-handler
]

[lint.per-file-ignores]
"services/**/tests/*.py" = ["E402"]
"services/**/test_*.py" = ["E402"]
"services/**/scripts/*.py" = ["E402"]
"services/**/run_*.py" = ["E402"]
"services/**/verify_*.py" = ["E402"]
"services/orchestrator/test_full_pipeline.py" = ["E402"]
"services/pr_card_scraper/tests/*.py" = ["E402"]
"services/pr_card_scraper/run_scraper.py" = ["E402"]
"services/report_generator/apply_manual_sample.py" = ["E402"]
"services/report_generator/verify_yellow_mapping.py" = ["E402"]
"services/site_analysis/test_api.py" = ["E402"]
"services/rag_service/scripts/*.py" = ["E402"]
"services/rag_service/services/langgraph_rag.py" = ["E402"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
