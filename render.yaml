databases:
  - name: postgres
    databaseName: redevelopment
    user: redevelopment
    plan: free
    postgresMajorVersion: 15

services:
  - type: redis
    name: redis
    plan: free
    ipAllowList: []

  - type: web
    name: orchestrator
    env: docker
    dockerfilePath: services/orchestrator/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis
          property: connectionString
      - key: SITE_ANALYSIS_URL
        value: http://site-analysis:8001
      - key: HEIGHT_URL
        value: http://aviation-height:8002
      - key: PREMIUM_URL
        value: http://ready-reckoner:8003
      - key: REPORT_URL
        value: http://report-generator:8004
      - key: PR_CARD_URL
        value: http://pr-card-scraper:8005
      - key: RAG_URL
        value: http://rag-service:8006
      - key: MCGM_PROPERTY_URL
        value: http://mcgm-property-lookup:8007
      - key: DP_REPORT_URL
        value: http://dp-remarks-report:8008

  - type: worker
    name: orchestrator-worker
    env: docker
    dockerfilePath: services/orchestrator/Dockerfile
    dockerCommand: "arq services.orchestrator.services.worker.WorkerSettings"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis
          property: connectionString

  - type: pserv
    name: site-analysis
    env: docker
    dockerfilePath: services/site_analysis/Dockerfile
    
  - type: pserv
    name: aviation-height
    env: docker
    dockerfilePath: services/aviation_height/Dockerfile

  - type: pserv
    name: ready-reckoner
    env: docker
    dockerfilePath: services/ready_reckoner/Dockerfile

  - type: pserv
    name: report-generator
    env: docker
    dockerfilePath: services/report_generator/Dockerfile

  - type: pserv
    name: pr-card-scraper
    env: docker
    dockerfilePath: services/pr_card_scraper/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString

  - type: pserv
    name: mcgm-property-lookup
    env: docker
    dockerfilePath: services/mcgm_property_lookup/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString

  - type: pserv
    name: dp-remarks-report
    env: docker
    dockerfilePath: services/dp_remarks_report/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString

  - type: pserv
    name: ocr-service
    env: docker
    dockerfilePath: services/ocr_service/Dockerfile

  - type: pserv
    name: rag-service
    env: docker
    dockerfilePath: services/rag_service/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: MILVUS_URI
        sync: false
      - key: MILVUS_TOKEN
        sync: false
