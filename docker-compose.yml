services:

  traefik:
    image: traefik:v3
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dhara_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dhara_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:15-alpine
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_USER=redevelopment
      - POSTGRES_PASSWORD=redevelopment
      - POSTGRES_DB=redevelopment
      - POSTGRES_MULTIPLE_DATABASES=orchestrator_db,rag_service_db,pr_card_scraper_db,mcgm_property_lookup_db,dp_remarks_report_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    networks:
      - dhara_net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "redevelopment"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  orchestrator:
    build: ./services/orchestrator
    image: redevelopment-ai/orchestrator:v1
    volumes:
      - ./services/orchestrator:/app
      - ./report_outputs:/tmp/reports
      - upload_data:/tmp/uploads
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_JWT_KEY=${CLERK_JWT_KEY}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_JWT_ISSUER=${CLERK_JWT_ISSUER:-clerk.accounts.dev}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=postgresql+asyncpg://redevelopment:redevelopment@postgres:5432/orchestrator_db
      - REDIS_URL=redis://redis:6379
      - SITE_ANALYSIS_URL=http://site_analysis:8001
      - HEIGHT_URL=http://aviation_height:8002
      - PREMIUM_URL=http://ready_reckoner:8003
      - REPORT_URL=http://report_generator:8004
      - PR_CARD_URL=http://pr_card_scraper:8005
      - RAG_URL=http://rag_service:8006
      - MCGM_PROPERTY_URL=http://mcgm_property_lookup:8007
      - DP_REPORT_URL=http://dp_remarks_report:8008
      - READY_RECKONER_URL=http://ready_reckoner:8003
      - SERP_API_KEY=${SERP_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@dharaai.com}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Dhara AI}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - PYTHONPATH=.
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - dhara_net
    restart: unless-stopped

  site_analysis:
    build: ./services/site_analysis
    ports:
      - "8001:8001"
    environment:
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - SERP_API_KEY=${SERP_API_KEY}
    networks:
      - dhara_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  aviation_height:
    build: ./services/aviation_height
    ports:
      - "8002:8002"
    environment:
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - SERP_API_KEY=${SERP_API_KEY}
    networks:
      - dhara_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ready_reckoner:
    build: ./services/ready_reckoner
    ports:
      - "8003:8003"
    networks:
      - dhara_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  report_generator:
    build: ./services/report_generator
    ports:
      - "8004:8004"
    volumes:
      - ./report_outputs:/tmp/reports
    networks:
      - dhara_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  pr_card_scraper:
    build: ./services/pr_card_scraper
    ports:
      - "8005:8005"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - DATABASE_URL=postgresql://redevelopment:redevelopment@postgres:5432/pr_card_scraper_db
    depends_on:
      - postgres
    networks:
      - dhara_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  milvus:
    image: milvusdb/milvus:2.6-20260317-200a2d76
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    security_opt:
      - seccomp:unconfined
    environment:
      - ETCD_ENDPOINTS=milvus_etcd:2379
      - MINIO_ADDRESS=milvus_minio:9000
      - KNOWHERE_SIMD_TYPE=auto
      - COMMON_STORAGETYPE=minio
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - dhara_net
    depends_on:
      milvus_etcd:
        condition: service_healthy
      milvus_minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s


  milvus_etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - dhara_net
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  milvus_minio:
    image: minio/minio:latest
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    networks:
      - dhara_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcgm_property_lookup:
    build: ./services/mcgm_property_lookup
    ports:
      - "8007:8007"
    environment:
      - DATABASE_URL=postgresql://redevelopment:redevelopment@postgres:5432/mcgm_property_lookup_db
    depends_on:
      - postgres
    networks:
      - dhara_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    dns:
      - 8.8.8.8
      - 8.8.4.4

  dp_remarks_report:
    build: ./services/dp_remarks_report
    ports:
      - "8008:8008"
    environment:
      - DATABASE_URL=postgresql://redevelopment:redevelopment@postgres:5432/dp_remarks_report_db
    depends_on:
      - postgres
    networks:
      - dhara_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    dns:
      - 8.8.8.8
      - 8.8.4.4

  rag_service:
    build: ./services/rag_service
    image: redevelopment-ai/rag-service:v2
    ports:
      - "8006:8006"
    environment:
      - PORT=8006
      - DEV_MODE=true
      - DATABASE_URL=postgresql://redevelopment:redevelopment@postgres:5432/rag_service_db
      - SECRET_KEY=${SECRET_KEY:-7c995f82ba3a032a562b71010459672b6ad0710d690f9f89c82150a39300ada8}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - MILVUS_COLLECTION=${MILVUS_COLLECTION:-documents}
      - MILVUS_COLLECTION_RAG=${MILVUS_COLLECTION_RAG:-dcpr_knowledge}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - dhara_net
    volumes:
      - ./services/rag_service/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  dhara_net:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  upload_data:
  milvus_data:
  etcd_data:
  minio_data:
