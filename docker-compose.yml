services:

  traefik:
    image: traefik:v3
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dhara_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dhara_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:15-alpine
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_USER=redevelopment
      - POSTGRES_PASSWORD=redevelopment
      - POSTGRES_DB=redevelopment
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dhara_net
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "redevelopment" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  orchestrator:
    build: ./services/orchestrator
    image: redevelopment-ai/orchestrator:v1
    volumes:
      - ./services/orchestrator:/app
      - ./report_outputs:/tmp/reports
      - upload_data:/tmp/uploads
    ports:
      - "8000:8000"
    env_file:
      - .env # For global defaults if needed
      - ./services/orchestrator/.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - dhara_net
    restart: unless-stopped

  site_analysis:
    build: ./services/site_analysis
    ports:
      - "8001:8001"
    env_file:
      - ./services/site_analysis/.env
    networks:
      - dhara_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  aviation_height:
    build: ./services/aviation_height
    ports:
      - "8002:8002"
    env_file:
      - ./services/aviation_height/.env
    networks:
      - dhara_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ready_reckoner:
    build: ./services/ready_reckoner
    ports:
      - "8003:8003"
    env_file:
      - ./services/ready_reckoner/.env
    networks:
      - dhara_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8003/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  report_generator:
    build: ./services/report_generator
    ports:
      - "8004:8004"
    volumes:
      - ./report_outputs:/tmp/reports
    env_file:
      - ./services/report_generator/.env
    networks:
      - dhara_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8004/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  pr_card_scraper:
    build: ./services/pr_card_scraper
    ports:
      - "8005:8005"
    env_file:
      - ./services/pr_card_scraper/.env
    depends_on:
      - postgres
    networks:
      - dhara_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8005/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  milvus:
    image: milvusdb/milvus:v2.4.0
    command: [ "milvus", "run", "standalone" ]
    ports:
      - "19530:19530"
      - "9091:9091"
    security_opt:
      - seccomp:unconfined
    environment:
      - ETCD_ENDPOINTS=milvus_etcd:2379
      - KNOWHERE_SIMD_TYPE=auto
      - COMMON_STORAGETYPE=local
      - COMMON_LOG_LEVEL=warning
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - dhara_net
    depends_on:
      milvus_etcd:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 150s

  milvus_etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://milvus_etcd:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - dhara_net
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  milvus_attu:
    image: zilliz/attu:latest
    ports:
      - "8081:3000" # Expose Attu on port 8081 on the host
    environment:
      - MILVUS_URL=milvus:19530 # Point to the Milvus service within the Docker network
    networks:
      - dhara_net
    depends_on:
      milvus:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mcgm_property_lookup:
    build: ./services/mcgm_property_lookup
    ports:
      - "8007:8007"
    env_file:
      - ./services/mcgm_property_lookup/.env
    depends_on:
      - postgres
    networks:
      - dhara_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8007/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    dns:
      - 8.8.8.8
      - 8.8.4.4

  dp_remarks_report:
    build: ./services/dp_remarks_report
    ports:
      - "8008:8008"
    env_file:
      - ./services/dp_remarks_report/.env
    depends_on:
      - postgres
    networks:
      - dhara_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8008/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    dns:
      - 8.8.8.8
      - 8.8.4.4

  rag_service:
    build: ./services/rag_service
    image: redevelopment-ai/rag-service:v2
    ports:
      - "8006:8006"
    env_file:
      - ./services/rag_service/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dhara_net
    volumes:
      - ./services/rag_service/data:/app/data
    restart: on-failure:5
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8006/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  dhara_net:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  upload_data:
  milvus_data:
  etcd_data:
