title = "Dhara RAG - Gitleaks Configuration"

# Extend the default gitleaks rules with project-specific patterns
[extend]

# Paths to ignore (non-secret files)
[allowlist]
  description = "Global allowlist"
  paths = [
    '''.gitleaks\.toml''',
    '''\.env\.example''',
    '''requirements.*\.txt''',
    '''package-lock\.json''',
    '''yarn\.lock''',
    '''\.pre-commit-config\.yaml''',
  ]

# Custom rules for project-specific secrets
[[rules]]
  id = "dhara-openai-key"
  description = "OpenAI API Key"
  regex = '''sk-proj-[A-Za-z0-9_-]{20,}'''
  tags = ["api-key", "openai"]

[[rules]]
  id = "dhara-zilliz-token"
  description = "Zilliz Cloud Token"
  regex = '''(?i)zilliz[_\s]*token\s*=\s*['"]?[A-Za-z0-9_-]{20,}'''
  tags = ["api-key", "zilliz"]

[[rules]]
  id = "dhara-serpapi-key"
  description = "SerpApi Key"
  regex = '''(?i)serp[_\s]*api[_\s]*key\s*=\s*['"]?[a-f0-9]{30,}'''
  tags = ["api-key", "serpapi"]

[[rules]]
  id = "dhara-hf-token"
  description = "HuggingFace Token"
  regex = '''hf_[A-Za-z0-9]{20,}'''
  tags = ["api-key", "huggingface"]

[[rules]]
  id = "dhara-langsmith-key"
  description = "LangSmith API Key"
  regex = '''lsv2_[A-Za-z0-9_-]{20,}'''
  tags = ["api-key", "langsmith"]

[[rules]]
  id = "dhara-db-password-in-url"
  description = "Database password in connection URL"
  regex = '''postgresql://[^:]+:[^@]{3,}@'''
  tags = ["database", "password"]
  [rules.allowlist]
    regexes = [
      '''postgresql://postgres:postgres@localhost''',
    ]
