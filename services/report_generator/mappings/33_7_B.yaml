# Mapping file for FINAL TEMPLATE _ 33 (7)(B) .xlsx
# Generated from dossier + services/cell_mapper.py.
# 58/63 cells: sourced from cell_mapper.py _COMMON blocks (30(A)+33(7)(B) CLUBBING).
# 5/63 cells: explicit overrides (see scripts/regen_mapping.py EXPLICIT dict).

template: "FINAL TEMPLATE _ 33 (7)(B).xlsx"
scheme: "33(7)(B)"
version: 1
generated_from_dossier: dossiers/33_7_B.dossier.json
last_reviewed_by: auto (cell_mapper.py import)
last_reviewed_at: 2026-04-21
cells:

  # Society name header at top of Details sheet
  - cell: Details!A1
    kind: black
    calc: report_header
    semantic_name: report_header_title

  # CTS/FP and Village Labels (Top Right)
  - cell: Details!M1
    kind: black
    calc: label_with_value
    calc_args:
      label: "Cts No. /FP No.:-"
      path: cts_no
    semantic_name: label_cts_fp

  - cell: Details!M2
    kind: black
    calc: label_with_value
    calc_args:
      label: "Village :-"
      path: village
    semantic_name: label_village
    transform: str

  # Incentive FSI rule (Society Age > 30 years)
  - cell: Details!B19
    kind: black
    calc: incentive_bua_33_7_b
    semantic_name: incentive_bua_33_7_b
    transform: float

  # Literal label prefix; real CTS/FP number lives in a yellow cell elsewhere
  # placeholder: 'Cts No. /FP No.:- 63'
  - cell: Details!M1
    kind: black
    semantic_name: cts_fp_no_label
    from: manual_inputs.cts_fp_no_label
    fallback: "Cts No. /FP No.:-"
    transform: str

  # Village label/value
  # placeholder: 'Village :-'
  - cell: Details!M2
    kind: black
    semantic_name: village_name
    sources:
      - mcgm_property.village
      - manual_inputs.village
    fallback: ""
    transform: str

  - cell: Details!P4
    kind: black
    semantic_name: area_sqm
    sources:
      - mcgm_property.area_sqm
      - plot_area_sqm
    fallback: 0
    transform: float

  - cell: Details!P7
    kind: black
    semantic_name: setback_area_sqm
    sources:
      - dp_report.setback_area_sqm
      - manual_inputs.setback_area_sqm
    fallback: 0
    transform: float

  - cell: Details!P14
    kind: black
    semantic_name: encroachment_area_sqm
    from: manual_inputs.encroachment_area_sqm
    fallback: 0
    transform: float

  # Reservation TDR
  - cell: Details!N17
    kind: black
    semantic_name: reservation_area_sqm
    sources:
      - dp_report.reservation_area_sqm
      - manual_inputs.reservation_area_sqm
    fallback: 0
    transform: float

  # Road
  - cell: Details!R17
    kind: black
    semantic_name: road_width_m
    sources:
      - dp_report.road_width_m
      - road_width_m
      - site_analysis.road_width_m
    fallback: 18.3
    transform: float

  - cell: Details!B19
    kind: black
    semantic_name: protected_area_sqm
    from: manual_inputs.protected_area_sqm
    fallback: 0
    transform: float

  # Old Set Back Area
  - cell: Details!N20
    kind: black
    semantic_name: old_setback_sqm
    from: manual_inputs.old_setback_sqm
    fallback: 0
    transform: float

  # Highway NOC (P25)
  - cell: Details!R25
    kind: black
    semantic_name: noc_highway
    from: manual_inputs.noc_highway
    fallback: 0
    transform: bool_toggle

  # MMRDA NOC (P26)
  - cell: Details!R26
    kind: black
    semantic_name: noc_mmrda
    from: manual_inputs.noc_mmrda
    fallback: 0
    transform: bool_toggle

  # MOEF NOC/ MPCB NOC (P27)
  - cell: Details!R27
    kind: black
    semantic_name: noc_moef
    from: manual_inputs.noc_moef
    fallback: 0
    transform: bool_toggle

  # Railway NOC (P28)
  - cell: Details!R28
    kind: black
    semantic_name: noc_railway
    from: manual_inputs.noc_railway
    fallback: 0
    transform: bool_toggle

  # ASI NOC (P29)
  - cell: Details!R29
    kind: black
    semantic_name: noc_asi
    sources:
      - dp_report.archaeological_site
      - manual_inputs.noc_asi
    fallback: 0
    transform: bool_toggle

  # MHCC/MA NOC (P30)
  - cell: Details!R30
    kind: black
    semantic_name: noc_mhcc
    sources:
      - dp_report.heritage_zone
      - dp_report.heritage_building
      - manual_inputs.noc_mhcc
    fallback: 0
    transform: bool_toggle

  # Civil Aviation NOC (P31)
  - cell: Details!R31
    kind: black
    semantic_name: noc_civil_aviation
    sources:
      - manual_inputs.noc_civil_aviation
    fallback: 0
    transform: bool_toggle

  # CRZ NOC (P32)
  - cell: Details!R32
    kind: black
    semantic_name: noc_crz
    sources:
      - dp_report.crz_zone
      - manual_inputs.noc_crz
    fallback: 0
    transform: bool_toggle

  # Other NOCs, if any (P33)
  - cell: Details!R33
    kind: black
    semantic_name: noc_other
    from: manual_inputs.noc_other
    fallback: 0
    transform: bool_toggle

  # Plot length abutting road
  - cell: Details!O40
    kind: black
    semantic_name: plot_road_length_m
    from: manual_inputs.plot_road_length_m
    fallback: 100
    transform: float

  # Sale Commercial MUN BUA
  - cell: Details!J45
    kind: black
    semantic_name: commercial_bua
    calc: commercial_bua_formula
    calc_args:
      total_fsi_cell: J31
      pct_path: manual_inputs.commercial_percentage

  # Existing Carpet Area (M47)
  - cell: Details!O47
    kind: black
    semantic_name: existing_commercial_carpet_sqft
    from: existing_commercial_carpet_sqft
    fallback: 0
    transform: float

  - cell: Details!Q47
    kind: black
    semantic_name: existing_residential_carpet_sqft
    from: existing_residential_carpet_sqft
    fallback: 0
    transform: float

  # No. of existing tenements
  - cell: Details!N49
    kind: yellow
    semantic_name: num_commercial
    from: num_commercial
    fallback: 12
    transform: int

  # No. of shop( user input/ocr old plan ) only commerical
  - cell: Details!P49
    kind: yellow
    semantic_name: num_flats
    from: num_flats
    fallback: 138
    transform: int


  # Rent (M50)
  - cell: Details!O50
    kind: black
    semantic_name: rent_commercial
    from: manual_inputs.rent_commercial
    fallback: 150
    transform: float

  - cell: Details!Q50
    kind: black
    semantic_name: rent_residential
    from: manual_inputs.rent_residential
    fallback: 70
    transform: float

  # Corpus Fund (M51)
  - cell: Details!O51
    kind: yellow
    semantic_name: corpus_commercial
    from: manual_inputs.corpus_commercial
    fallback: 1500
    transform: float

  - cell: Details!Q51
    kind: yellow
    semantic_name: corpus_residential
    from: manual_inputs.corpus_residential
    fallback: 1500
    transform: float

  # Ready Recknor Rate
  - cell: Details!J54
    kind: black
    semantic_name: rr_open_land_sqm
    sources:
      - ready_reckoner.rr_open_land_sqm
      - premium.rr_open_land_sqm
    fallback: 128870
    transform: float

  # Bank Gurantee
  - cell: Details!O54
    kind: black
    semantic_name: completion_months_commercial
    from: manual_inputs.completion_months_commercial
    fallback: 36
    transform: float

  # Calculate 15% annually of user input
  - cell: Details!Q54
    kind: black
    semantic_name: completion_months_residential
    from: manual_inputs.completion_months_residential
    fallback: 36
    transform: float


  # Note: - Per floor is 3mtr min - Calcuate no of floors as per
  - cell: Details!Q55
    kind: black
    semantic_name: completion_months_residential_2
    from: manual_inputs.completion_months_residential
    fallback: 36
    transform: float

  # I3 to R/C
  - cell: Details!O58
    kind: black
    semantic_name: rent_commercial_2
    from: manual_inputs.rent_commercial
    fallback: 0
    transform: float

  # OPEN SPACE DEFICIENCY
  - cell: Details!N62
    kind: black
    semantic_name: staircase_ratio
    from: manual_inputs.staircase_ratio
    fallback: 0.25
    transform: float

  # STAIRCASE
  - cell: Details!N63
    kind: black
    semantic_name: osd_ratio
    from: manual_inputs.osd_ratio
    fallback: 0.4
    transform: float

  # CONSTRUCTION AREA
  - cell: Details!O64
    kind: black
    semantic_name: completion_months_commercial_2
    from: manual_inputs.completion_months_commercial
    fallback: 0
    transform: float

  # PODIUM CONST AREA
  - cell: Details!N65
    kind: black
    semantic_name: basement_ratio
    from: manual_inputs.basement_ratio
    fallback: 0.6
    transform: float

  # 1000mtr plot area= no podium  2500mtr plot are = 60% 5000 = 
  - cell: Details!O65
    kind: black
    semantic_name: basement_count
    from: manual_inputs.basement_count
    fallback: 2
    transform: int

  # BASEMENT CONST AREA
  - cell: Details!N66
    kind: black
    semantic_name: podium_ratio
    from: manual_inputs.podium_ratio
    fallback: 0.6
    transform: float

  # Take user input first : Yes/No BASED on Yes follow condition
  - cell: Details!O66
    kind: black
    semantic_name: deposit_commercial
    from: manual_inputs.deposit_commercial
    fallback: 0
    transform: float

  - cell: Construction Cost!D8
    kind: yellow
    semantic_name: const_rate_commercial
    from: manual_inputs.const_rate_commercial
    fallback: 3600
    transform: float

  # x
  - cell: Construction Cost!D12
    kind: yellow
    semantic_name: const_rate_residential
    from: manual_inputs.const_rate_residential
    fallback: 3600
    transform: float

  # x
  - cell: Construction Cost!D15
    kind: yellow
    semantic_name: const_rate_podium
    from: manual_inputs.const_rate_podium
    fallback: 2200
    transform: float

  # x
  - cell: Construction Cost!H21
    kind: yellow
    semantic_name: const_rate_basement
    from: manual_inputs.const_rate_basement
    fallback: 2000
    transform: float

  # Conditional note re: nalla (stormwater drain) — typically blank
  # placeholder: 'If nalla touching & coming inside the lot then check dp map see blue area then 5'
  - cell: MCGM PAYMENTS!B327
    kind: black
    semantic_name: nalla_note
    from: manual_inputs.nalla_note
    fallback: ""
    transform: str

  # 79A Cost/Acquisition
  - cell: SUMMARY 1!I98
    kind: yellow
    semantic_name: cost_79a_acquisition
    from: manual_inputs.cost_79a_acquisition
    fallback: 0
    transform: float

  # Ground Floor
  - cell: Profit & Loss Statement!C19
    kind: yellow
    semantic_name: commercial_gf_area
    from: manual_inputs.commercial_gf_area
    fallback: 0
    transform: float

  # Ground Floor
  - cell: Profit & Loss Statement!D19
    kind: yellow
    semantic_name: sale_rate_commercial_gf
    sources:
      - ready_reckoner.sale_rate_commercial_gf
      - financial.sale_rate_commercial_gf
    fallback: 75000
    transform: float

  # 1st Floor
  - cell: Profit & Loss Statement!C20
    kind: yellow
    semantic_name: commercial_1f_area
    from: manual_inputs.commercial_1f_area
    fallback: 0
    transform: float

  # 1st Floor
  - cell: Profit & Loss Statement!D20
    kind: yellow
    semantic_name: sale_rate_commercial_1f
    from: financial.sale_rate_commercial_1f
    fallback: 60000
    transform: float

  # 2nd Floor
  - cell: Profit & Loss Statement!C21
    kind: yellow
    semantic_name: commercial_2f_area
    from: manual_inputs.commercial_2f_area
    fallback: 0
    transform: float

  # 2nd Floor
  - cell: Profit & Loss Statement!D21
    kind: yellow
    semantic_name: sale_rate_commercial_2f
    from: financial.sale_rate_commercial_2f
    fallback: 0
    transform: float

  # Other Floors
  - cell: Profit & Loss Statement!C22
    kind: yellow
    semantic_name: commercial_1f_area_2
    from: manual_inputs.commercial_1f_area
    fallback: 0
    transform: float

  - cell: Profit & Loss Statement!D22
    kind: yellow
    semantic_name: sale_rate_commercial_other
    from: financial.sale_rate_commercial_other
    fallback: 0
    transform: float

  - cell: Profit & Loss Statement!D28
    kind: yellow
    semantic_name: sale_rate_residential
    sources:
      - ready_reckoner.sale_rate_residential
      - financial.sale_rate_residential
      - sale_rate_per_sqft
    fallback: 50000
    transform: float

  # Cars to sell
  - cell: Profit & Loss Statement!C30
    kind: black
    semantic_name: parking_units_for_sale
    from: manual_inputs.parking_units_for_sale
    fallback: 75
    transform: int

  # Calcuate Car parking no /2
  - cell: Profit & Loss Statement!D30
    kind: yellow
    semantic_name: parking_price_per_unit
    sources:
      - ready_reckoner.parking_price_per_unit
      - financial.parking_price_per_unit
    fallback: 1200000
    transform: float

  # --- EXPIRY TRACKING ---
  - cell: Details!J55
    kind: red
    description: "Development charge for BUA (31763)"
    expires_on: "2027-03-31"
    alert_days_before: 60
